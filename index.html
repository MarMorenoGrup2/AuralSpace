<!DOCTYPE html>
<html lang="es">
<head>
    <title>Aplicació web d'auralització</title>
    <link rel="icon" href="Images/ICONO_.jpg">
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <link rel="stylesheet" href="styles.css">
</head>
<body>

    <div id="loading-overlay">
        <h2>PREPARING ACUSTICS...</h2>
        <div id="load-progress">0%</div>
    </div>

    <div id="ui-container">
        <h1>AuralSpace</h1>

        <label class="upload-area">
            UPLOAD AUDIO
            <input type="file" id="audioInput" accept="audio/*">
        </label>

        <button id="playButton" class="btn">PLAY AUDIO</button>

        <button class="configRoomBtn" onclick="window.location.href='add.html'">
             UPLOAD YOUR ROOM
        </button>

        <div style="margin-top: 15px;">
            <label style="font-size: 11px; color: #aaa; display: block; margin-bottom: 5px; text-align: center;">
                - Volume +
            </label>
            <input type="range" id="mixSlider" min="0" max="1" step="0.01" value="1" style="width: 100%; accent-color: #ff4444;">
        </div>

        <div id="audioList"></div>
    </div>

    <script type="importmap">
    {
        "imports": {
            "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
            "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/"
        }
    }
    </script>

    <script type="module" src="script.js"></script>
</body>
</html>
